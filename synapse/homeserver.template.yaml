# Synapse (Matrix) 設定テンプレート
#
#   start.sh が変数プレースホルダを環境変数で置換して /data/homeserver.yaml を生成します。
#   署名鍵 (signing.key) は start.sh が初回に自動生成します。
#
# この homeserver は WorkAdventure 専用のプライベートチャットサーバーです。
#   - フェデレーション（他サーバーとの連携）は無効
#   - ログインは WorkAdventure が SECRET_KEY で署名した JWT で行います

server_name: "${SYNAPSE_SERVER_NAME}"
public_baseurl: "${MATRIX_PUBLIC_BASEURL}"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: sqlite3
  args:
    database: /data/homeserver.db

log_config: "/config/log.config"
media_store_path: /data/media_store
signing_key_path: "/data/signing.key"

report_stats: false

registration_shared_secret: "${MATRIX_REGISTRATION_SHARED_SECRET}"
macaroon_secret_key: "${MATRIX_MACAROON_SECRET}"
form_secret: "${MATRIX_FORM_SECRET}"

trusted_key_servers:
  - server_name: "matrix.org"
suppress_key_server_warning: true

# フェデレーションは無効（外部 Matrix サーバーとはやり取りしない）
federation_domain_whitelist: []

# WorkAdventure は SECRET_KEY で署名した JWT を使ってユーザーをログインさせます。
# secret は play / back の SECRET_KEY と同じ値である必要があります。
jwt_config:
  enabled: true
  secret: "${JWT_SECRET}"
  algorithm: "HS256"
  subject_claim: "matrixUserId"

# JWT ログイン時にアカウントを自動作成できるよう登録を有効化します。
# （/_matrix は Traefik 経由で公開されるため、必要に応じて Basic 認証で保護してください）
enable_registration: true
enable_registration_without_verification: true
registration_requires_token: false

# クライアントが homeserver を自動検出できるよう .well-known を配信します。
serve_server_wellknown: true

allow_guest_access: false
enable_authenticated_media: false

user_directory:
  enabled: true
  search_all_users: true

# WorkAdventure はチャット利用時に多くのログイン/ルーム作成を行うため、
# レート制限を緩めに設定します。
rc_login:
  address:
    per_second: 0.15
    burst_count: 10
  account:
    per_second: 0.18
    burst_count: 10
  failed_attempts:
    per_second: 0.19
    burst_count: 10

rc_room_creation:
  per_second: 10
  burst_count: 10000
