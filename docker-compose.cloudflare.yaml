## Cloudflare Tunnel 用のオーバーレイ設定。
##
## docker-compose.yaml と一緒に読み込んで使います:
##   docker compose -f docker-compose.yaml -f docker-compose.cloudflare.yaml up -d
## （.env の COMPOSE_FILE を設定しておけば ./start.sh だけでOK）
##
## ポイント:
##  - HTTPS の終端は Cloudflare 側で行うため、Traefik の Let's Encrypt と
##    HTTP→HTTPS リダイレクトを無効化し、:80 で素の HTTP を配信します。
##  - cloudflared コンテナが Cloudflare へアウトバウンド接続するので、
##    ルーターのポート開放は不要です。
##  - Cloudflare ダッシュボードのトンネル設定で、公開ホスト名(例 wa.example.com)の
##    サービス転送先を「http://reverse-proxy:80」にしてください。
services:
  reverse-proxy:
    # 元の command から「HTTP→HTTPS リダイレクト」の2行だけを取り除いたもの。
    # これで :80 がアプリをそのまま配信する（cloudflared の転送先）。
    # 他のエントリポイント/証明書リゾルバ定義はそのまま残し、ルーターの警告を防ぐ。
    command:
      - --log.level=${LOG_LEVEL}
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entryPoints.grpc.address=:50051
      - --certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: ${RESTART_POLICY}
    networks:
      - default
    depends_on:
      - reverse-proxy
