## Cloudflare Tunnel 用のオーバーレイ設定。
##
## docker-compose.yaml と一緒に読み込んで使います:
##   docker compose -f docker-compose.yaml -f docker-compose.cloudflare.yaml up -d
## （.env の COMPOSE_FILE を設定しておけば ./start.sh だけでOK）
##
## ポイント:
##  - HTTPS の終端は Cloudflare 側で行うため、Traefik の Let's Encrypt と
##    HTTP→HTTPS リダイレクトを無効化し、:80 で素の HTTP を配信します。
##  - cloudflared コンテナが Cloudflare へアウトバウンド接続するので、
##    ルーターのポート開放は不要です。
##  - Cloudflare ダッシュボードのトンネル設定で、公開ホスト名(例 wa.example.com)の
##    サービス転送先を「http://reverse-proxy:80」にしてください。
services:
  reverse-proxy:
    # Cloudflare がSSLを終端するため、:80 で素のHTTPを配信するだけでよい。
    # HTTP→HTTPS リダイレクトと ACME 証明書取得は不要（Cloudflare側が処理）。
    # ACME設定を残すと、DNSがCloudflare経由のためHTTP challengeがNXDOMAINで
    # 失敗し続けるのでここでは削除する。
    command:
      - --log.level=${LOG_LEVEL}
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entryPoints.grpc.address=:50051

  # Cloudflare 環境では myresolver（ACME）が存在しないため、各サービスの
  # -ssl ルーターから certresolver 参照を空文字で上書きして ERR を消す。
  # TLS 自体は Cloudflare 側で終端されるので証明書自動取得は不要。
  play:
    labels:
      traefik.http.routers.play-ssl.tls.certresolver: ""
      traefik.http.routers.play-ws-ssl.tls.certresolver: ""
      traefik.http.routers.room-api.tls.certresolver: ""

  back:
    labels:
      traefik.http.routers.back-ssl.tls.certresolver: ""

  uploader:
    labels:
      traefik.http.routers.uploader-ssl.tls.certresolver: ""

  icon:
    labels:
      traefik.http.routers.icon-ssl.tls.certresolver: ""
      traefik.http.routers.lettericons-ssl.tls.certresolver: ""

  map-storage:
    labels:
      traefik.http.routers.map-storage-ssl.tls.certresolver: ""

  synapse:
    labels:
      traefik.http.routers.matrix-ssl.tls.certresolver: ""

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: ${RESTART_POLICY}
    depends_on:
      - reverse-proxy
